<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FREE V12</title>

<style>
body{
  background:#020617;
  color:#00ffcc;
  font-family:Consolas;
  text-align:center;
  padding:40px;
}
.box{
  border:1px solid red;
  padding:30px;
  width:400px;
  margin:auto;
  border-radius:15px;
  box-shadow:0 0 20px red;
}
button{
  margin-top:15px;
  padding:10px;
  width:100%;
  background:#00ffff;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#00ffcc;
}
</style>
</head>

<body>

<h1>🔓 MODO GRATIS</h1>

<div class="box">
  <h3>Acceso limitado</h3>

  <p>❌ Funciones PRO bloqueadas</p>

  <!-- 💳 PAYPAL -->
  <div id="paypal-button-container"></div>

  <!-- 🏦 BANCO -->
  <h3>🏦 Pago por transferencia</h3>
  <p>Banco: Popular</p>
  <p>Cuenta: 123456789</p>
  <p>Nombre: Tu Nombre</p>

  <button onclick="enviarComprobante()">Ya pagué</button>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- PAYPAL -->
<script src="https://www.paypal.com/sdk/js?client-id=TU_CLIENT_ID&currency=USD"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyD1w_66STxqf5iMVneB8DgLnpFwS8RGy3g",
  authDomain: "rutarizador-v12.firebaseapp.com",
  projectId: "rutarizador-v12",
  storageBucket: "rutarizador-v12.firebasestorage.app",
  messagingSenderId: "928870753252",
  appId: "1:928870753252:web:f57cb32567e1a1138b1df1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 VALIDAR USUARIO + REDIRECCIÓN PRO
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "index.html";
    return;
  }

  const ref = doc(db,"usuarios",user.uid);
  const snap = await getDoc(ref);

  if(snap.exists() && snap.data().pro){
    window.location.href = "pro.html";
  }
});

// 💳 PAYPAL
paypal.Buttons({
  createOrder: (data, actions)=>{
    return actions.order.create({
      purchase_units: [{
        amount: { value: "10.00" }
      }]
    });
  },

  onApprove: async (data, actions)=>{
    await actions.order.capture();

    const user = auth.currentUser;

    if(user){
      await setDoc(doc(db,"usuarios",user.uid),{
        email: user.email,
        pro: true
      },{merge:true});

      alert("✅ Pago confirmado - Eres PRO");
      window.location.href = "pro.html";
    }
  }

}).render('#paypal-button-container');

// 🏦 BANCO
window.enviarComprobante = async ()=>{
  const user = auth.currentUser;

  if(!user){
    alert("No logueado");
    return;
  }

  await setDoc(doc(db,"pagos",user.uid),{
    email: user.email,
    estado: "pendiente"
  });

  alert("📩 Enviado, espera confirmación admin");
}

// 🚪 LOGOUT
window.logout = ()=> signOut(auth);

</script>

</body>
</html>
