<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#050814;
    color:#fff;
    display: none;
}

/* CONTENEDOR */
.container {
    padding:20px;
}

/* TITULO */
h1 {
    color:#00e5ff;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

/* CARD */
.card {
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
}

/* VALORES */
.value {
    font-size:24px;
    margin-top:10px;
}

/* BOTON */
.btn {
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00e5ff;
    cursor:pointer;
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}
</style>
</head>

<body>

<div class="container">

<h1>DASHBOARD</h1>

<!-- TARJETAS -->
<div class="grid">

<div class="card">
    Saldo Total
    <div class="value" id="saldo">$0</div>
</div>

<div class="card">
    Ganancias Hoy
    <div class="value" id="today">$0</div>
</div>

<div class="card">
    Referidos
    <div class="value" id="refs">0</div>
</div>

</div>

<!-- REFERIDOS -->
<div class="card">
    <h3>Tu link de referido</h3>
    <input id="refLink">
    <button class="btn" onclick="copyLink()">Copiar</button>
</div>

<!-- ACCIONES -->
<button class="btn" onclick="simular()">Simular ganancia</button>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";


// 🔥 TU CONFIG REAL
const firebaseConfig = {
  apiKey: "AIzaSyD1w_66STxqf5iMVneB8DgLnpFwS8RGy3g",
  authDomain: "rutarizador-v12.firebaseapp.com",
  projectId: "rutarizador-v12",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


// 🧠 CONTROL DE SESIÓN + CARGA DE DATOS
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    // 🔥 mostrar dashboard
    document.body.style.display = "block";

    try {
        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);
        const data = snap.data() || {};

        // 💰 datos
        document.getElementById("saldo").textContent = "$" + (data.earnings || 0);
        document.getElementById("refs").textContent = data.refs || 0;
        document.getElementById("today").textContent = "$" + (data.today || 0);

        // 🔗 link referido
        const link = window.location.origin + "/index.html?ref=" + (data.referralCode || "");
        document.getElementById("refLink").value = link;

    } catch (error) {
        console.error(error);
    }

});


// 📋 copiar link
window.copyLink = () => {
    const input = document.getElementById("refLink");
    input.select();
    document.execCommand("copy");
    alert("Link copiado");
};


// 🎯 SIMULAR GANANCIA
window.simular = async () => {

    const user = auth.currentUser;
    const ref = doc(db, "users", user.uid);

    await updateDoc(ref, {
        earnings: increment(5),
        today: increment(5)
    });

    location.reload();
};

</script>

</body>
</html>
