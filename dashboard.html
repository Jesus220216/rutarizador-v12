<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel</title>

<style>
body{
    background:#020617;
    color:#00ffcc;
    font-family:Consolas, monospace;
    text-align:center;
    padding:50px;
}

.card{
    background:#020617;
    padding:30px;
    border-radius:15px;
    border:1px solid #00ffff;
    box-shadow:0 0 20px #00ffff;
}

button{
    padding:10px 20px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    cursor:pointer;
}

button:hover{
    box-shadow:0 0 20px #00ffff;
}
</style>
</head>

<body>

<script>
if (localStorage.getItem("auth") !== "true") {
    window.location.href = "index.html";
}

function logout(){
    localStorage.removeItem("auth");
    window.location.href = "index.html";
}
</script>

<div class="card">
    <h1>✔ ACCESO AUTORIZADO</h1>
    <p>Bienvenido al sistema</p>

    <button onclick="logout()">Cerrar sesión</button>
</div>

</body>
</html>
