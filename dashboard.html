<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #0a0f1f, #050814);
  color:#fff;
  display:none;
}

/* TITULO */
.title {
  text-align:center;
  color:#00e5ff;
  text-shadow:0 0 15px #00e5ff;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

/* CARDS */
.card {
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:15px;
  border:1px solid #00e5ff33;
  box-shadow:0 0 15px #00e5ff33;
  text-align:center;
}

.full {
  margin:20px;
}

/* BOTONES */
.btn {
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
  width:100%;
}

.neon {
  background:linear-gradient(45deg,#00e5ff,#00ff88);
  color:#000;
  font-weight:bold;
  box-shadow:0 0 10px #00e5ff;
}

.danger {
  background:red;
  color:#fff;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}
</style>

</head>

<body>

<h1 class="title">DASHBOARD</h1>

<div class="grid">

<div class="card">
  <p>Saldo Total</p>
  <h2 id="saldo">$0.00</h2>
</div>

<div class="card">
  <p>Ganancias Hoy</p>
  <h2 id="today">$0.00</h2>
</div>

<div class="card">
  <p>Retiros Pendientes</p>
  <h2 id="retiros">0</h2>
</div>

<div class="card">
  <p>Referidos Activos</p>
  <h2 id="refs">0</h2>
</div>

</div>

<div class="card full">
  <h3>Tu código de referido</h3>
  <p id="myCode"></p>
  <button onclick="copyMyRef()" class="btn neon">📋 Copiar link</button>
</div>

<div class="card full">
  <h3>Ver anuncios</h3>
  <button onclick="verAnuncio()" class="btn neon">Ganar $0.01</button>
</div>

<div class="card full">
  <h3>Mini juego</h3>
  <button onclick="miniJuego()" class="btn neon">Click y gana $0.02</button>
</div>

<div class="card full">
  <h3>Retirar dinero</h3>
  <input id="paypal" placeholder="Correo PayPal">
  <button onclick="retirar()" class="btn neon">Solicitar retiro</button>
</div>

<div style="padding:20px;">
  <button id="logoutBtn" class="btn danger">Cerrar sesión</button>
</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
