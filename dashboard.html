<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard V12</title>

<style>
body{
  background:#020617;
  color:#00ffcc;
  font-family:Consolas;
  text-align:center;
  padding:40px;
}

.box{
  border:1px solid #00ffff;
  padding:30px;
  width:400px;
  margin:auto;
  border-radius:15px;
  box-shadow:0 0 20px #00ffff;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#00ffff;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00ffcc;
}
</style>
</head>

<body>

<h1>🚀 PANEL V12</h1>

<div class="box">
  <h3>Bienvenido al sistema</h3>

  <p>Acceso autorizado ✅</p>

  <button onclick="irAdmin()">Ir a Admin</button>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<script>

// 🔐 PROTEGER ACCESO
if(localStorage.getItem("auth") !== "true"){
    window.location.href = "index.html";
}

// 🔗 IR AL ADMIN
function irAdmin(){
  window.location.href = "admin.html";
}

// 🚪 LOGOUT
function logout(){
  localStorage.removeItem("auth");
  window.location.href = "index.html";
}

</script>

</body>
</html>
