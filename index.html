<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutartizador Login</title>

<style>
/* (mantengo tu diseño mejorado) */
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0f1f, #050814);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.card {
    width: 340px;
    padding: 30px;
    border-radius: 18px;
    background: #0f172a;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 25px rgba(0,255,255,0.2);
    text-align: center;
}

.icon { font-size: 32px; color: #ffcc00; }
h1 { color: #00e5ff; }
.version { color: #c084fc; }
.subtitle { font-size: 12px; color: #aaa; margin-bottom: 20px; }

label {
    display: block;
    text-align: left;
    font-size: 12px;
    margin-top: 12px;
    color: #ffd54f;
}

input {
    width: 100%;
    padding: 11px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #00e5ff40;
    background: #020617;
    color: #fff;
}

.btn {
    width: 100%;
    margin-top: 15px;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: #facc15;
    font-weight: bold;
    cursor: pointer;
}

.link {
    margin-top: 10px;
    display: block;
    font-size: 12px;
    color: #ccc;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">⚡</div>

    <h1>RUTARTIZADOR</h1>
    <div class="version">V1.2 ADVANCED</div>
    <div class="subtitle">Sistema Avanzado de Ganancias</div>

    <!-- 🔑 IMPORTANTE: IDs deben coincidir con tu JS -->
    <label>USUARIO</label>
    <input type="email" id="loginEmail" placeholder="correo@ejemplo.com">

    <label>CONTRASEÑA</label>
    <input type="password" id="loginPassword" placeholder="••••••••">

    <button id="loginBtn" class="btn">ENTRAR</button>

    <button id="registerBtn" class="btn" style="margin-top:10px;background:#22c55e;">
        REGISTRARSE
    </button>

</div>

<!-- 🔥 IMPORTAR TU JS -->
<script type="module" src="login.js"></script>

</body>
</html>
