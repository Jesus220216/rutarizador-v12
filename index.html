<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutartizador Login</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #0a0f1f, #050814);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
    }

    .card {
        width: 320px;
        padding: 30px;
        border-radius: 15px;
        background: #0f172a;
        box-shadow: 0 0 20px rgba(0,255,255,0.3);
        border: 1px solid rgba(0,255,255,0.2);
        text-align: center;
    }

    .icon {
        font-size: 30px;
        color: #ffcc00;
        margin-bottom: 10px;
    }

    h1 {
        margin: 5px 0;
        color: #00e5ff;
        font-size: 24px;
        letter-spacing: 2px;
    }

    .version {
        color: #c084fc;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .subtitle {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 20px;
    }

    label {
        display: block;
        text-align: left;
        font-size: 12px;
        margin-top: 12px;
        color: #ffd54f;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #00e5ff55;
        background: #020617;
        color: #fff;
        outline: none;
    }

    input::placeholder {
        color: #666;
    }

    .btn {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #facc15;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #eab308;
    }

    .link {
        margin-top: 15px;
        display: block;
        font-size: 12px;
        color: #ccc;
        text-decoration: none;
    }

    .footer {
        margin-top: 20px;
        font-size: 10px;
        color: #888;
    }
</style>
</head>

<body>

<div class="card">
    <div class="icon">⚡</div>

    <h1>RUTARTIZADOR</h1>
    <div class="version">V1.2 ADVANCED</div>
    <div class="subtitle">Sistema Avanzado de Ganancias</div>

    <label>USUARIO</label>
    <input type="email" placeholder="correo@ejemplo.com">

    <label>CONTRASEÑA</label>
    <input type="password" placeholder="••••••••">

    <label>KEY DE ACCESO</label>
    <input type="text" placeholder="Ingresa la KEY">

    <label>¿TIENES CÓDIGO DE REFERIDO?</label>
    <input type="text" placeholder="Código de referido (opcional)">

    <button class="btn">ENTRAR</button>

    <a href="#" class="link">REGISTRARSE</a>

    <div class="footer">
        KEY por defecto: PR0123 | Admin: admin@gmail.com
    </div>
</div>

</body>
</html>
