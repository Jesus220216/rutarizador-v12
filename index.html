<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rotarizador V12</title>
    
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5850246232454900"
     crossorigin="anonymous"></script>
    
<style>
body{
    background:#020617;
    color:#00ffcc;
    font-family:Consolas, monospace;
    text-align:center;
    padding:40px;
}

/* Título efecto glitch */
h1{
    font-size:40px;
    margin-bottom:5px;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff, 0 0 20px #00ffff;
    animation:glitch 1s infinite;
}

@keyframes glitch{
    0%{text-shadow:2px 0 red;}
    20%{text-shadow:-2px 0 blue;}
    40%{text-shadow:2px 2px #00ffff;}
    60%{text-shadow:-2px -2px #00ffff;}
    80%{text-shadow:2px 0 #00ffff;}
    100%{text-shadow:0 0 #00ffff;}
}

.sub{
    color:#22d3ee;
    margin-bottom:30px;
}

/* Card */
.card{
    background:#020617;
    padding:30px;
    border-radius:15px;
    width:320px;
    margin:auto;
    border:1px solid #00ffff;
    box-shadow:0 0 20px #00ffff;
}

/* Logo con pulso */
.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
    box-shadow:0 0 20px #00ffff;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px #00ffff;}
    50%{box-shadow:0 0 40px #00ffff;}
    100%{box-shadow:0 0 10px #00ffff;}
}

/* Inputs */
input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #00ffff;
    background:#020617;
    color:#00ffcc;
    outline:none;
}

/* Botón hacker */
button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#00ffcc;
    box-shadow:0 0 20px #00ffff;
}
</style>
</head>

<body>

<h1>ROTARIZADOR V12</h1>
<div class="sub">Acceso Seguro</div>

<div class="card">

    <!-- TU LOGO -->
    <img src="logo.jpg" class="logo">

    <h2>Login</h2>

    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <input type="text" id="key" placeholder="KEY">

    <button onclick="login()">ENTRAR</button>

</div>

<script>
function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;
    const key  = document.getElementById("key").value;

    if (user === "jesus" && pass === "123456" && key === "V12") {
        localStorage.setItem("auth", "true");
        window.location.href = "dashboard.html";
    } else {
        alert("❌ ACCESO DENEGADO");
    }
}
</script>

</body>
</html>
