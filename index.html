<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutartizador Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0f1f, #050814);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.card {
    width: 340px;
    padding: 30px;
    border-radius: 18px;
    background: #0f172a;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 25px rgba(0,255,255,0.2);
    text-align: center;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 15px rgba(0,255,255,0.2); }
    to   { box-shadow: 0 0 35px rgba(0,255,255,0.6); }
}

.icon {
    font-size: 32px;
    color: #ffcc00;
    margin-bottom: 10px;
}

h1 {
    margin: 5px 0;
    color: #00e5ff;
    letter-spacing: 2px;
}

.version {
    color: #c084fc;
    font-weight: bold;
}

.subtitle {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 20px;
}

label {
    display: block;
    text-align: left;
    font-size: 12px;
    margin-top: 12px;
    color: #ffd54f;
}

input {
    width: 100%;
    padding: 11px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #00e5ff40;
    background: #020617;
    color: #fff;
    outline: none;
}

input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 10px #00e5ff80;
}

.btn {
    width: 100%;
    margin-top: 15px;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #facc15, #fde047);
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #facc15;
}

.footer {
    margin-top: 15px;
    font-size: 10px;
    color: #888;
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">⚡</div>

    <h1>RUTARTIZADOR</h1>
    <div class="version">V1.2 ADVANCED</div>
    <div class="subtitle">Sistema Avanzado de Ganancias</div>

    <!-- 🔑 IMPORTANTE: IDs conectados -->
    <label>USUARIO</label>
    <input type="email" id="loginEmail" placeholder="correo@ejemplo.com">

    <label>CONTRASEÑA</label>
    <input type="password" id="loginPassword" placeholder="••••••••">

    <label>CÓDIGO DE REFERIDO</label>
    <input type="text" id="referralCode" placeholder="Opcional">

    <button id="loginBtn" class="btn">ENTRAR</button>
    <button id="registerBtn" class="btn">REGISTRARSE</button>

    <div class="footer">
        Sistema seguro con Firebase 🔐
    </div>
</div>

<!-- 🔥 Scripts -->
<script type="module" src="login.js"></script>
<script type="module" src="authCheck.js"></script>

</body>
</html>
