<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutartizador</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0f1f, #050814);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

/* FULLSCREEN APP */
body, html {
    overflow: hidden;
}

/* CARD */
.card {
    width: 340px;
    padding: 30px;
    border-radius: 18px;
    background: #0f172a;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 25px rgba(0,255,255,0.2);
    text-align: center;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 15px rgba(0,255,255,0.2); }
    to   { box-shadow: 0 0 35px rgba(0,255,255,0.6); }
}

.icon { font-size: 32px; color: #ffcc00; }

h1 { color: #00e5ff; }

label {
    display:block;
    text-align:left;
    margin-top:10px;
    font-size:12px;
    color:#ffd54f;
}

input {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #00e5ff40;
    background:#020617;
    color:white;
}

/* PASSWORD TOGGLE */
.password-box {
    position: relative;
}

.toggle {
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:12px;
    color:#00e5ff;
}

/* BUTTON */
.btn {
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#facc15;
    cursor:pointer;
}

/* COPY BTN */
.copy-btn {
    margin-top:5px;
    font-size:12px;
    cursor:pointer;
    color:#00e5ff;
}

/* LOADER */
.loader {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000a;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    display:none;
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">⚡</div>
    <h1>RUTARTIZADOR</h1>

    <label>Email</label>
    <input id="loginEmail" type="email">

    <label>Contraseña</label>
    <div class="password-box">
        <input id="loginPassword" type="password">
        <span class="toggle" onclick="togglePass()">VER</span>
    </div>

    <label>Código referido</label>
    <input id="referralCode">

    <div class="copy-btn" onclick="copyRef()">📋 Pegar referido</div>

    <button id="loginBtn" class="btn">Entrar</button>
    <button id="registerBtn" class="btn">Registrarse</button>
    <button onclick="ruleta()">Ruleta 🎡</button>
</div>

<div class="loader" id="loader">Cargando...</div>

<script type="module" src="login.js"></script>
<script type="module" src="authCheck.js"></script>

<script>
// 👁 Mostrar / ocultar contraseña
window.togglePass = () => {
    const input = document.getElementById("loginPassword");
    input.type = input.type === "password" ? "text" : "password";
};

// 📋 Copiar referido desde URL
window.copyRef = () => {
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");

    if (ref) {
        document.getElementById("referralCode").value = ref;
        alert("Código aplicado: " + ref);
    } else {
        alert("No hay código en el link");
    }
};

// 🔗 AUTO DETECTAR ?ref=
window.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");

    if (ref) {
        document.getElementById("referralCode").value = ref;
    }
});

// 🎨 LOADER cuando login
const showLoader = () => document.getElementById("loader").style.display = "flex";
const hideLoader = () => document.getElementById("loader").style.display = "none";

// interceptar botones
document.addEventListener("DOMContentLoaded", () => {

    loginBtn.addEventListener("click", () => {
        showLoader();
        setTimeout(() => hideLoader(), 2000);
    });

    registerBtn.addEventListener("click", () => {
        showLoader();
        setTimeout(() => hideLoader(), 2000);
    });

});
</script>

</body>
</html>
